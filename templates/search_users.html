<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поиск пользователей — MiniGram</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="search-box">
  <a href="{{ url_for('chat') }}" class="back-link">← Назад</a>
  <h2>Поиск пользователей</h2>

  {% if message %}
    <div class="flash-msg">{{ message }}</div>
  {% endif %}

  <form method="POST">
    <div class="search-row">
      <input class="input" type="text" name="query" placeholder="Введите username..." value="{{ query }}" autofocus>
      <button class="btn btn-primary" type="submit" name="query_btn">Найти</button>
    </div>
  </form>

  {% if results %}
    <ul class="search-results">
      {% for user in results %}
      <li class="search-result-item">
        <span class="result-name">@{{ user['username'] }}</span>
        <form method="POST" style="display:inline">
          <input type="hidden" name="add_contact" value="{{ user['id'] }}">
          <button class="btn btn-sm" type="submit">Добавить</button>
        </form>
      </li>
      {% endfor %}
    </ul>
  {% elif query %}
    <p class="no-results">Пользователи не найдены.</p>
  {% endif %}
</div>
</body>
</html>
