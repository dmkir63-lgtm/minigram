<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Создать канал — MiniGram</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="search-box">
  <a href="{{ url_for('chat') }}" class="back-link">← Назад</a>
  <h2>Создать канал</h2>

  {% if message %}
    <div class="flash-msg">{{ message }}</div>
  {% endif %}

  <form method="POST">
    <input class="input" type="text" name="name" placeholder="Название канала" required>
    <div class="input-prefix-row">
      <span class="prefix">@</span>
      <input class="input input-prefixed" type="text" name="username" placeholder="username_канала" required>
    </div>
    <textarea class="input textarea" name="description" placeholder="Описание канала (необязательно)" rows="3"></textarea>
    <label class="checkbox-label">
      <input type="checkbox" name="is_private"> Приватный канал
    </label>
    <button class="btn btn-primary" type="submit">Создать канал</button>
  </form>
</div>
</body>
</html>
